<script>
  function setCurrentDate() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;
  }

  function setCityFromLatLng(lat, lng) {
    const cityInput = document.getElementById('city');

    fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
      .then(res => res.json())
      .then(data => {
        const addr = data.address || {};
        const city =
          addr.city ||
          addr.town ||
          addr.village ||
          addr.suburb ||
          addr.county ||
          'Unknown';
        cityInput.value = city;
      })
      .catch(() => {
        cityInput.value = 'Unknown';
      });
  }

  function getCurrentLocation() {
    const latInput = document.getElementById('latitude');
    const lngInput = document.getElementById('longitude');
    const cityInput = document.getElementById('city');

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        position => {
          const lat = position.coords.latitude.toFixed(6);
          const lng = position.coords.longitude.toFixed(6);

          latInput.value = lat;
          lngInput.value = lng;
          cityInput.value = 'Detecting city...';

          setCityFromLatLng(lat, lng);
        },
        () => {
          cityInput.value = 'Location not available';
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    } else {
      cityInput.value = 'Geolocation not supported';
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    setCurrentDate();
    getCurrentLocation();

    const form = document.getElementById('trackingForm');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      messageDiv.textContent = "⏳ Submitting...";
      messageDiv.className = "";
      messageDiv.style.display = "block";

      const formData = new FormData(form);

      fetch(form.action, {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        if (data.result === 'success') {
          messageDiv.className = 'success';
          messageDiv.textContent = '✅ Location submitted successfully!';

          setTimeout(() => {
            form.reset();
            setCurrentDate();
            getCurrentLocation();
            messageDiv.style.display = 'none';
          }, 4000);
        } else {
          messageDiv.className = 'error';
          messageDiv.textContent = '❌ Server error: ' + (data.message || '');
        }
      })
      .catch(() => {
        messageDiv.className = 'error';
        messageDiv.textContent = '❌ Network error. Please try again.';
      });
    });
  });
</script>
