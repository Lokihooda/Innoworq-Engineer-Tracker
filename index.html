<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innoworq Engineer Tracking (Pro Sync)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; padding:20px; }
        .container { max-width:800px; margin:0 auto; }
        header { background:white; padding:30px; border-radius:12px; margin-bottom:20px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        header h1 { color:#667eea; display:flex; justify-content:center; align-items:center; gap:10px; }
        
        /* Sync Status Bar */
        .sync-status { background:#fffbeb; border:1px solid #f59e0b; padding:15px; border-radius:12px; margin-bottom:20px; display:none; align-items:center; justify-content:space-between; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
        .sync-info { display:flex; align-items:center; gap:10px; color:#92400e; font-weight:600; font-size:14px; }
        .sync-btn { background:#f59e0b; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:12px; transition: 0.3s; }
        .sync-btn:hover { background:#d97706; }

        .form-card { background:white; padding:30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px; }
        .form-group { display:flex; flex-direction:column; }
        .form-group label { font-weight:600; margin-bottom:6px; display:flex; gap:8px; align-items:center; }
        .form-group input, .form-group select, .form-group textarea { padding:12px; border:2px solid #e0e0e0; border-radius:8px; font-size:14px; width:100%; }
        .submit-btn { width:100%; padding:15px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; font-weight:600; }
        
        #message { margin-top:15px; padding:15px; border-radius:8px; display:none; text-align:center; font-weight:600; }
        .success { background:#d1fae5; color:#065f46; border: 1px solid #059669; }
        
        @media(max-width:600px){ .form-row{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-satellite-dish"></i> Innoworq Field Ops</h1>
    </header>

    <div id="syncBar" class="sync-status">
        <div class="sync-info">
            <i class="fas fa-cloud-upload-alt fa-spin"></i>
            <span id="syncText">0 records waiting to sync...</span>
        </div>
        <button onclick="syncData()" class="sync-btn">Sync Now</button>
    </div>

    <div class="form-card">
        <form id="trackingForm">
            <div class="form-row">
                <div class="form-group"><label><i class="fas fa-user"></i> Name</label><input type="text" name="engineer" required></div>
                <div class="form-group"><label><i class="fas fa-id-card"></i> ID</label><input type="text" name="employeeId" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label><i class="fas fa-ticket-alt"></i> Ticket</label><input type="text" name="ticketId"></div>
                <div class="form-group"><label><i class="fas fa-calendar"></i> Date</label><input type="date" id="date" name="date" required></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label><i class="fas fa-clock"></i> Login</label><input type="time" name="loginTime" required></div>
                <div class="form-group"><label><i class="fas fa-briefcase"></i> Shift</label><select name="Shift"><option>Day</option><option>Night</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label><i class="fas fa-tasks"></i> Status</label><select name="Status" required><option>Assigned</option><option>Available</option><option>Travelling</option><option>On Leave</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label><i class="fas fa-map-pin"></i> Lat</label><input type="text" id="lat" name="Latitude" readonly></div>
                <div class="form-group"><label><i class="fas fa-map-pin"></i> Lng</label><input type="text" id="lng" name="Longitude" readonly></div>
            </div>
            <div class="form-group"><label><i class="fas fa-comment"></i> Remarks</label><textarea name="Remarks"></textarea></div>

            <button type="submit" id="submitBtn" class="submit-btn">
                <i class="fas fa-save"></i> Save Location
            </button>
        </form>
        <div id="message"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const _supabase = supabase.createClient('https://eyodotdtktfzumztemmt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5b2RvdGR0a3RmenVtenRlbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzUyMTcsImV4cCI6MjA4Nzk1MTIxN30.iMR5tMXFL7dZIv5gz4LXeOfr3wJEQlZn7IO_PpdqMLU');

// --- SYNC ENGINE ---
async function syncData() {
    let pending = JSON.parse(localStorage.getItem('innoworq_pending') || "[]");
    const bar = document.getElementById('syncBar');
    const text = document.getElementById('syncText');

    if (pending.length === 0) {
        bar.style.display = "none";
        return;
    }

    bar.style.display = "flex";
    text.innerText = `${pending.length} unsent record(s). Syncing...`;

    // Try sending one by one
    for (let i = 0; i < pending.length; i++) {
        try {
            const { error } = await _supabase.from('engineer_tracking').insert([pending[i]]);
            if (!error) {
                // Remove successfully sent item
                pending.splice(i, 1);
                localStorage.setItem('innoworq_pending', JSON.stringify(pending));
                i--; // Adjust index
                text.innerText = `${pending.length} unsent record(s)...`;
            } else {
                break; // Stop loop if server error
            }
        } catch (e) { 
            text.innerText = `Waiting for better signal to sync ${pending.length} records...`;
            break; 
        }
    }

    if (pending.length === 0) bar.style.display = "none";
}

// Background sync every 20 seconds
setInterval(syncData, 20000);

window.onload = () => {
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    navigator.geolocation.getCurrentPosition(pos => {
        document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('lng').value = pos.coords.longitude.toFixed(6);
    });
    
    syncData(); // Check for leftover records on start

    const form = document.getElementById('trackingForm');
    const msg = document.getElementById('message');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(form);
        const data = {
            engineer: formData.get('engineer'),
            employeeId: formData.get('employeeId'),
            ticketId: formData.get('ticketId'),
            date: formData.get('date'),
            loginTime: formData.get('loginTime'),
            shift: formData.get('Shift'),
            status: formData.get('Status'),
            latitude: parseFloat(formData.get('Latitude')) || 0,
            longitude: parseFloat(formData.get('Longitude')) || 0,
            remarks: formData.get('Remarks')
        };

        // 1. Save to Local Storage Immediately (No internet needed)
        const pending = JSON.parse(localStorage.getItem('innoworq_pending') || "[]");
        pending.push(data);
        localStorage.setItem('innoworq_pending', JSON.stringify(pending));

        // 2. Clear UI instantly
        msg.className = "success";
        msg.style.display = "block";
        msg.innerHTML = "✅ Saved locally! I'll upload it as soon as your internet is back.";
        form.reset();
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // 3. Try to sync immediately
        syncData();

        setTimeout(() => msg.style.display = "none", 5000);
    });
};
</script>
</body>
</html>
