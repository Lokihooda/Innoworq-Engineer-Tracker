<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innoworq Engineer Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; padding:20px; }
        .container { max-width:800px; margin:0 auto; }
        header { background:white; padding:30px; border-radius:12px; margin-bottom:30px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        header h1 { color:#667eea; display:flex; justify-content:center; align-items:center; gap:10px; }
        .form-card { background:white; padding:30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px; }
        .form-group { display:flex; flex-direction:column; }
        .form-group label { font-weight:600; margin-bottom:6px; display:flex; gap:8px; align-items:center; }
        .form-group input, .form-group select, .form-group textarea { padding:12px; border:2px solid #e0e0e0; border-radius:8px; font-size:14px; }
        textarea { resize:vertical; }
        .submit-btn { width:100%; padding:15px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; font-weight:600; }
        
        #message { margin-top:15px; padding:15px; border-radius:8px; display:none; text-align:left; font-size: 14px; }
        .success { background:#d1fae5; color:#065f46; border: 1px solid #059669; }
        .error { background:#fee2e2; color:#991b1b; border: 1px solid #ef4444; }
        
        .instructions { margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.7); border-radius: 6px; font-weight: normal; line-height: 1.6; border-left: 4px solid #ef4444; }
        .instructions b { color: #000; }
        .instructions ul { margin-left: 20px; margin-top: 5px; }
        .retry-status { display: inline-block; background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 10px; font-weight: bold; }

        @media(max-width:600px){ .form-row{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-map-marker-alt"></i> Innoworq Engineer Tracking</h1>
    </header>

    <div class="form-card">
        <form id="trackingForm">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Engineer Name</label>
                    <input type="text" name="engineer" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Employee ID</label>
                    <input type="text" name="employeeId" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-ticket-alt"></i> Ticket ID</label>
                    <input type="text" name="ticketId">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Login Time</label>
                    <input type="time" name="loginTime" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-briefcase"></i> Shift</label>
                    <select name="Shift" required>
                        <option value="">Select</option>
                        <option>Day</option>
                        <option>Night</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-tasks"></i> Status</label>
                    <select name="Status" required>
                        <option value="">Select</option>
                        <option>Assigned</option>
                        <option>On Hold</option>
                        <option>On Leave</option>
                        <option>Available</option>
                        <option>Travelling</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-location-dot"></i> Latitude</label>
                    <input type="text" id="latitude" name="Latitude" readonly required placeholder="Locating...">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-location-dot"></i> Longitude</label>
                    <input type="text" id="longitude" name="Longitude" readonly required placeholder="Locating...">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-city"></i> City (Auto)</label>
                    <input type="text" id="city" name="city" readonly placeholder="Waiting for GPS...">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-comment"></i> Remarks</label>
                <textarea name="Remarks"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">
                <i class="fas fa-paper-plane"></i> Submit Location
            </button>
        </form>

        <div id="message"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://eyodotdtktfzumztemmt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5b2RvdGR0a3RmenVtenRlbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzUyMTcsImV4cCI6MjA4Nzk1MTIxN30.iMR5tMXFL7dZIv5gz4LXeOfr3wJEQlZn7IO_PpdqMLU';

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function setCurrentDate(){
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
}

async function setCity(lat, lng) {
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
        const data = await res.json();
        const addr = data.address || {};
        document.getElementById('city').value = addr.city || addr.town || addr.village || addr.county || "Unknown";
    } catch (e) {
        document.getElementById('city').value = "Unknown";
    }
}

function getLocation(){
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude.toFixed(6);
            const lng = pos.coords.longitude.toFixed(6);
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;
            setCity(lat, lng);
        }, (err) => {
            alert("GPS Error: Please allow location access.");
        }, { enableHighAccuracy: true });
    }
}

// Helper function to handle Retries and Timeouts for Low Internet
async function insertWithRetry(data, maxRetries = 3) {
    for (let i = 0; i < maxRetries; i++) {
        try {
            const timeoutPromise = new Promise((_, reject) => 
                setTimeout(() => reject(new Error('Timeout')), 15000)
            );
            const insertPromise = _supabase.from('engineer_tracking').insert([data]);
            
            const result = await Promise.race([insertPromise, timeoutPromise]);
            if (result.error) throw result.error;
            return result;
        } catch (err) {
            console.warn(`Retry attempt ${i + 1} failed`);
            if (i === maxRetries - 1) throw err;
            await new Promise(r => setTimeout(r, 2000)); // Wait 2s before retry
            document.getElementById('message').innerHTML = `⏳ Signal weak, retrying... (${i + 1}/${maxRetries})`;
        }
    }
}

window.onload = () => {
    setCurrentDate();
    getLocation();

    const form = document.getElementById('trackingForm');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if(!document.getElementById('latitude').value) {
            alert("Still waiting for GPS. Please move to an open area for better signal.");
            return;
        }

        message.className = "success";
        message.style.display = "block";
        message.innerHTML = "⏳ Connecting to server...";
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.5";

        const formData = new FormData(form);
        const submissionData = {
            engineer: formData.get('engineer'),
            employeeId: formData.get('employeeId'),
            ticketId: formData.get('ticketId'),
            date: formData.get('date'),
            loginTime: formData.get('loginTime'),
            shift: formData.get('Shift'),
            status: formData.get('Status'),
            latitude: parseFloat(formData.get('Latitude')),
            longitude: parseFloat(formData.get('Longitude')),
            city: formData.get('city'),
            remarks: formData.get('Remarks')
        };

        try {
            await insertWithRetry(submissionData);

            message.innerHTML = "✅ <b>Success!</b> Your location has been recorded.";
            form.reset();
            setCurrentDate();
            getLocation();
            
            setTimeout(() => { 
                message.style.display = "none"; 
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
            }, 6000);

        } catch (err) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
            message.className = "error";

            if (err.message === 'Failed to fetch' || err.name === 'TypeError' || err.message === 'Timeout') {
                message.innerHTML = `
                    <strong>❌ Connection Failed (Internet/Blocker)</strong><br>
                    Data could not reach the server.
                    <div class="instructions">
                        <b>Please try these steps:</b>
                        <ul>
                            <li><b>Slow Internet:</b> Move to a spot with better mobile signal (4G/5G).</li>
                            <li><b>Switch Network:</b> If you are on Office Wi-Fi, turn it OFF and use Mobile Data.</li>
                            <li><b>Disable Blockers:</b> Turn off Ad-blockers or Brave Shields.</li>
                            <li><b>Refresh:</b> If it still fails, refresh the page and try once more.</li>
                        </ul>
                    </div>
                `;
            } else {
                message.innerHTML = "❌ <b>Database Error:</b> " + err.message;
            }
            console.error(err);
        }
    });
};
</script>
</body>
</html>
