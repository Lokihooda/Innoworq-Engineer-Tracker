    .container {

    header {

    }
    .form-group label i {

      font-size: 18px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px;

      border-radius: 6px;

      font-family: inherit;
      transition: border-color 0.3s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .submit-btn {

    #message {
      margin-top: 15px;

    #message.success {

    }

    .info-card {

    .info-card h3 {

      align-items: center;

    .info-card h3 i {

    .info-card p {

    .info-card a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #667eea;
      text-decoration: none;

      transition: color 0.3s;

    .info-card a:hover {

    }
    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;

      header h1 {

  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>
        <i class="fas fa-map-marker-alt"></i>
        Innoworq Engineer Tracking
      </h1>
    </header>

    <div class="form-card">
      <h2>Submit Engineer Location</h2>

      <!-- FORM START -->
      <form
        id="trackingForm"
        method="POST"
        action="<?= ScriptApp.getService().getUrl(); ?>"
      >
        <div class="form-row">
          <div class="form-group">
            <label for="engineer"><i class="fas fa-user"></i> Engineer Name</label>
            <input
              type="text"
              id="engineer"
              name="Engineer Name"
              required
              placeholder="Enter engineer name"
            >
          </div>
          <div class="form-group">
            <label for="empId"><i class="fas fa-id-card"></i> Employee ID</label>
            <input
              type="text"
              id="empId"
              name="Employee ID"
              required
              placeholder="Enter employee ID"
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ticketId"><i class="fas fa-ticket-alt"></i> Ticket ID</label>
            <input
              type="text"
              id="ticketId"
              name="Ticket ID"
              required
              placeholder="Enter ticket ID"
            >
          </div>
          <div class="form-group">
            <label for="date"><i class="fas fa-calendar"></i> Date</label>
            <input
              type="date"
              id="date"
              name="Date"
              required
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="time"><i class="fas fa-clock"></i> Login Time</label>
            <input
              type="time"
              id="time"
              name="Login Time"
              required
            >
          </div>
          <div class="form-group">
            <label for="shift"><i class="fas fa-briefcase"></i> Shift</label>
            <select id="shift" name="Shift" required>
              <option value="">Select shift</option>
              <option value="Day">Day</option>
              <option value="Night">Night</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="status"><i class="fas fa-tasks"></i> Status</label>
            <select id="status" name="Status" required>
              <option value="">Select status</option>
              <option value="En Route">En Route</option>
              <option value="On Site">On Site</option>
              <option value="Completed">Completed</option>
              <option value="Delayed">Delayed</option>
            </select>
          </div>
        </div>

        <!-- Lat / Long (read-only) -->
        <div class="form-row">
          <div class="form-group">
            <label for="latitude"><i class="fas fa-location-dot"></i> Latitude</label>
            <input
              type="number"
              id="latitude"
              name="Latitude"
              step="0.0001"
              required
              placeholder="28.5355"
              readonly
            >
          </div>
          <div class="form-group">
            <label for="longitude"><i class="fas fa-location-dot"></i> Longitude</label>
            <input
              type="number"
              id="longitude"
              name="Longitude"
              step="0.0001"
              required
              placeholder="77.3910"
              readonly
            >
          </div>
        </div>

        <!-- Single City box (read-only) -->
        <div class="form-row">
          <div class="form-group">
            <label for="city"><i class="fas fa-city"></i> City</label>
            <input
              type="text"
              id="city"
              name="City"
              readonly
              placeholder="Auto-filled from location"
            >
          </div>
        </div>
        <!-- End City -->

        <div class="form-group">
          <label for="remarks"><i class="fas fa-comment"></i> Remarks</label>
          <textarea
            id="remarks"
            name="Remarks"
            rows="4"
            placeholder="Enter any remarks..."
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fas fa-paper-plane"></i>
          Submit Location
        </button>
      </form>
      <!-- FORM END -->

      <div id="message"></div>
    </div>

    <div class="info-card">
      <h3><i class="fas fa-database"></i> Data Storage</h3>
      <p>All submissions are automatically saved to our database in real-time.</p>
      <p><strong>✅ No login required</strong> - Form is publicly accessible to everyone!</p>
    </div>
  </div>

  <script>
    function setCurrentDate() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').value = today;
    }

    // Reverse geocode using OpenStreetMap Nominatim
    function reverseGeocode(lat, lon) {
      const url =
        'https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' +
        encodeURIComponent(lat) +
        '&lon=' +
        encodeURIComponent(lon) +
        '&zoom=10&addressdetails=1';

      fetch(url, {
        headers: {
          'Accept': 'application/json'
        }
      })
        .then(res => res.json())
        .then(data => {
          if (data && data.address) {
            const addr = data.address;

            const city =
              addr.city ||
              addr.town ||
              addr.village ||
              addr.hamlet ||
              addr.suburb ||
              '';

            document.getElementById('city').value = city;
          } else {
            document.getElementById('city').value = '';
          }
        })
        .catch(err => {
          console.error('Reverse geocode error:', err);
        });
    }

    function getCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          position => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            document.getElementById('latitude').value = lat.toFixed(4);
            document.getElementById('longitude').value = lon.toFixed(4);

            reverseGeocode(lat, lon);
          },
          error => {
            console.log('Geolocation error:', error);
          }
        );
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      setCurrentDate();
      getCurrentLocation();

      const form = document.getElementById('trackingForm');
      const messageDiv = document.getElementById('message');

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        const formData = new FormData(form);

        fetch(form.action, {
          method: 'POST',
          body: formData
        })
          .then(res => res.json())
          .then(data => {
            if (data.result === 'success') {
              messageDiv.className = 'success';
              messageDiv.textContent = 'Location submitted successfully!';
              messageDiv.style.display = 'block';

              setTimeout(() => {
                form.reset();
                setCurrentDate();
                getCurrentLocation();
                messageDiv.className = '';
                messageDiv.textContent = '';
                messageDiv.style.display = 'none';
              }, 5000);
            } else {
              messageDiv.className = 'error';
              messageDiv.textContent =
                'Server error: ' + (data.message || 'Unknown error');
              messageDiv.style.display = 'block';
            }
          })
          .catch(err => {
            console.error(err);
            messageDiv.className = 'error';
            messageDiv.textContent =
              'Network error submitting location. Please try again.';
            messageDiv.style.display = 'block';
          });
      });
    });
  </script>
</body>
</html>
