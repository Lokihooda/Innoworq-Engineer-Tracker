<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innoworq Engineer Tracking</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
    }
    h1 {
      text-align: center;
      color: #667eea;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    #message {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>

<body>

<div class="container">
  <h1><i class="fas fa-map-marker-alt"></i> Innoworq Engineer Tracking</h1>

  <form id="trackingForm" method="POST" action="<?= scriptUrl ?>">

    <label>Engineer Name</label>
    <input type="text" name="Engineer Name" required>

    <label>Employee ID</label>
    <input type="text" name="Employee ID" required>

    <label>Ticket ID</label>
    <input type="text" name="Ticket ID" required>

    <label>Date</label>
    <input type="date" id="date" name="Date" required>

    <label>Login Time</label>
    <input type="time" name="Login Time" required>

    <label>Shift</label>
    <select name="Shift" required>
      <option value="">Select</option>
      <option value="Day">Day</option>
      <option value="Night">Night</option>
    </select>

    <label>Status</label>
    <select name="Status" required>
      <option value="">Select</option>
      <option value="En Route">En Route</option>
      <option value="On Site">On Site</option>
      <option value="Completed">Completed</option>
      <option value="Delayed">Delayed</option>
    </select>

    <label>Latitude</label>
    <input type="text" id="latitude" name="Latitude" readonly required>

    <label>Longitude</label>
    <input type="text" id="longitude" name="Longitude" readonly required>

    <label>City</label>
    <input type="text" id="city" name="City" readonly>

    <label>Remarks</label>
    <textarea name="Remarks"></textarea>

    <button type="submit">
      <i class="fas fa-paper-plane"></i> Submit Location
    </button>
  </form>

  <div id="message"></div>
</div>

<script>
  const form = document.getElementById('trackingForm');
  const messageDiv = document.getElementById('message');

  function setCurrentDate() {
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
  }

  function getLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        document.getElementById('latitude').value = lat.toFixed(4);
        document.getElementById('longitude').value = lon.toFixed(4);

        reverseGeocode(lat, lon);
      });
    }
  }

  function reverseGeocode(lat, lon) {
    fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`)
      .then(res => res.json())
      .then(data => {
        if (data.address) {
          document.getElementById('city').value =
            data.address.city ||
            data.address.town ||
            data.address.village ||
            '';
        }
      });
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = new FormData(form);

    fetch("<?= scriptUrl ?>", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if (data.result === "success") {
        messageDiv.className = "success";
        messageDiv.textContent = "Location submitted successfully!";
        form.reset();
        setCurrentDate();
        getLocation();
      } else {
        messageDiv.className = "error";
        messageDiv.textContent = "Server error: " + data.message;
      }
    })
    .catch(() => {
      messageDiv.className = "error";
      messageDiv.textContent = "Network error. Please try again.";
    });
  });

  setCurrentDate();
  getLocation();
</script>

</body>
</html>
