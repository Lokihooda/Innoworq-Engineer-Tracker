<script>
  function setCurrentDate() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;
  }

  // Reverse geocode using OpenStreetMap Nominatim
  function reverseGeocode(lat, lon) {
    const url =
      'https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' +
      encodeURIComponent(lat) +
      '&lon=' +
      encodeURIComponent(lon) +
      '&zoom=10&addressdetails=1';

    fetch(url, {
      headers: {
        // VERY IMPORTANT: identify your app as required by Nominatim policy
        'Accept': 'application/json',
        'User-Agent': 'InnoworqEngineerTracking/1.0 (your-email@example.com)'
      }
    })
      .then(res => res.json())
      .then(data => {
        console.log('Nominatim response:', data); // debug

        if (data && data.address) {
          const addr = data.address;

          // City (fallbacks)
          const city =
            addr.city ||
            addr.town ||
            addr.village ||
            addr.hamlet ||
            '';

          // State (also check state_district etc. as fallback)
          const state =
            addr.state ||
            addr.state_district ||
            addr.region ||
            addr.province ||
            '';

          document.getElementById('city').value = city;
          document.getElementById('state').value = state;
        } else {
          console.warn('No address in Nominatim response');
        }
      })
      .catch(err => {
        console.error('Reverse geocode error:', err);
      });
  }

  function getCurrentLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        position => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          document.getElementById('latitude').value = lat.toFixed(4);
          document.getElementById('longitude').value = lon.toFixed(4);

          // Call reverse geocoding after we get lat/lon
          reverseGeocode(lat, lon);
        },
        error => {
          console.log('Geolocation error:', error);
        }
      );
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    setCurrentDate();
    getCurrentLocation();

    const form = document.getElementById('trackingForm');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', function (e) {
      e.preventDefault(); // stop page navigation

      const formData = new FormData(form);

      fetch(form.action, {
        method: 'POST',
        body: formData
      })
        .then(res => res.json())
        .then(data => {
          if (data.result === 'success') {
            messageDiv.className = 'success';
            messageDiv.textContent = 'Location submitted successfully!';
            messageDiv.style.display = 'block';

            // After 5 seconds, reset form and hide message
            setTimeout(() => {
              form.reset();
              setCurrentDate();
              getCurrentLocation(); // this will also refill city/state
              messageDiv.className = '';
              messageDiv.textContent = '';
              messageDiv.style.display = 'none';
            }, 5000);
          } else {
            messageDiv.className = 'error';
            messageDiv.textContent =
              'Server error: ' + (data.message || 'Unknown error');
            messageDiv.style.display = 'block';
          }
        })
        .catch(err => {
          console.error(err);
          messageDiv.className = 'error';
          messageDiv.textContent =
            'Network error submitting location. Please try again.';
          messageDiv.style.display = 'block';
        });
    });
  });
</script>
