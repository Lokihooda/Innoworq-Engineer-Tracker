<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="container">
  <header>
    <h1><i class="fas fa-map-marker-alt"></i> Innoworq Engineer Tracking</h1>
  </header>

  <div class="form-card">
    <h2>Submit Engineer Location</h2>
    <form id="trackingForm">
      <!-- Row 1: Engineer Name and Ticket ID -->
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Engineer Name</label>
          <input type="text" name="engineer" required placeholder="Enter engineer name">
        </div>

        <div class="form-group">
          <label><i class="fas fa-ticket-alt"></i> Ticket ID</label>
          <input type="text" name="ticketId" required placeholder="Enter ticket ID">
        </div>
        
      <!-- Row: Employee ID -->
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-id-card"></i> Employee ID</label>
          <input type="text" name="employeeId" required placeholder="Enter employee ID">
        </div>
      </div>
      </div>

      <!-- Row 2: Date and Login Time -->
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-calendar"></i> Date</label>
          <input type="date" name="date" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-clock"></i> Login Time</label>
          <input type="time" name="loginTime" required>
        </div>
      </div>

      <!-- Row 3: Shift and Status -->
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-moon"></i> Shift</label>
          <select name="shift" required>
            <option value="">Select shift</option>
            <option value="Day">Day</option>
            <option value="Night">Night</option>
          </select>
        </div>

        <div class="form-group">
          <label><i class="fas fa-info-circle"></i> Status</label>
          <select name="status" required>
            <option value="">Select status</option>
            <option value="En Route">En Route</option>
            <option value="On Site">On Site</option>
            <option value="Completed">Completed</option>
            <option value="Delayed">Delayed</option>
          </select>
        </div>
      </div>

      <!-- Row 4: Latitude and Longitude -->
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-map-pin"></i> Latitude</label>
          <input type="text" name="latitude" required placeholder="28.5355">
        </div>

        <div class="form-group">
          <label><i class="fas fa-map-pin"></i> Longitude</label>
          <input type="text" name="longitude" required placeholder="77.3910">
        </div>
      </div>

      <!-- Remarks -->
      <div class="form-group">
        <label><i class="fas fa-comment"></i> Remarks</label>
        <textarea name="remarks" rows="4" placeholder="Enter any remarks..."></textarea>
      </div>

      <button type="submit" class="submit-btn">
        <i class="fas fa-paper-plane"></i> Submit Location
      </button>

      <div id="message" class="message"></div>
    </form>
  </div>

  <div class="info-card">
    <h3><i class="fas fa-database"></i> Data Storage</h3>
    <p>All submissions are automatically saved to Google Sheets in real-time.</p>
    <a href="https://docs.google.com/spreadsheets/d/1aauwkCiG9LAT0FKgI4tA5C4g8cn2MCXHjh3aVSIMfKA/" target="_blank" class="link-btn">
      <i class="fas fa-external-link-alt"></i> View Data Sheet
    </a>
  </div>
</div>
