<!DOCTYPE html>
<html lang="en">
<head>
  <!-- head as before ... -->
</head>
<body>
  <div class="container">
    <header>
      <h1>
        <i class="fas fa-map-marker-alt"></i>
        Innoworq Engineer Tracking
      </h1>
    </header>

    <div class="form-card">
      <h2>Submit Engineer Location</h2>

      <!-- FORM START -->
      <form
        id="trackingForm"
        method="POST"
        action="https://script.google.com/macros/s/AKfycbxfdgamqp0nAdqDJT1xJ2c92Shx7KLyZ_m8VnCiGrbt8HSRX2nAPkhvD6BlqjcY6k6ObQ/exec"
      >
        <!-- KEEP ONLY THE COLUMNS YOU WANT IN SHEET.
             Remove any form-group you don't want recorded. -->

        <div class="form-row">
          <div class="form-group">
            <label for="engineer"><i class="fas fa-user"></i> Engineer Name</label>
            <input
              type="text"
              id="engineer"
              name="Engineer Name"
              required
              placeholder="Enter engineer name"
            >
          </div>
          <div class="form-group">
            <label for="empId"><i class="fas fa-id-card"></i> Employee ID</label>
            <input
              type="text"
              id="empId"
              name="Employee ID"
              required
              placeholder="Enter employee ID"
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ticketId"><i class="fas fa-ticket-alt"></i> Ticket ID</label>
            <input
              type="text"
              id="ticketId"
              name="Ticket ID"
              required
              placeholder="Enter ticket ID"
            >
          </div>
          <div class="form-group">
            <label for="date"><i class="fas fa-calendar"></i> Date</label>
            <input
              type="date"
              id="date"
              name="Date"
              required
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="time"><i class="fas fa-clock"></i> Login Time</label>
            <input
              type="time"
              id="time"
              name="Login Time"
              required
            >
          </div>
          <div class="form-group">
            <label for="shift"><i class="fas fa-briefcase"></i> Shift</label>
            <select id="shift" name="Shift" required>
              <option value="">Select shift</option>
              <option value="Day">Day</option>
              <option value="Night">Night</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="status"><i class="fas fa-tasks"></i> Status</label>
            <select id="status" name="Status" required>
              <option value="">Select status</option>
              <option value="En Route">En Route</option>
              <option value="On Site">On Site</option>
              <option value="Completed">Completed</option>
              <option value="Delayed">Delayed</option>
            </select>
          </div>
        </div>

        <!-- LAT / LNG (READONLY) -->
        <div class="form-row">
          <div class="form-group">
            <label for="latitude"><i class="fas fa-location-dot"></i> Latitude</label>
            <input
              type="number"
              id="latitude"
              name="Latitude"
              step="0.0001"
              required
              placeholder="28.5355"
              readonly
            >
          </div>
          <div class="form-group">
            <label for="longitude"><i class="fas fa-location-dot"></i> Longitude</label>
            <input
              type="number"
              id="longitude"
              name="Longitude"
              step="0.0001"
              required
              placeholder="77.3910"
              readonly
            >
          </div>
        </div>

        <!-- CITY DISPLAY ONLY (NO name ATTRIBUTE) -->
        <div class="form-row">
          <div class="form-group">
            <label for="city"><i class="fas fa-city"></i> City (auto-detected)</label>
            <input
              type="text"
              id="city"
              placeholder="Detecting city..."
              readonly
            >
          </div>
        </div>

        <div class="form-group">
          <label for="remarks"><i class="fas fa-comment"></i> Remarks</label>
          <textarea
            id="remarks"
            name="Remarks"
            rows="4"
            placeholder="Enter any remarks..."
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fas fa-paper-plane"></i>
          Submit Location
        </button>
      </form>
      <!-- FORM END -->

      <div id="message"></div>
    </div>

    <div class="info-card">
      <h3><i class="fas fa-database"></i> Data Storage</h3>
      <p>All submissions are automatically saved to our database in real-time.</p>
      <p><strong>✅ No login required</strong> - Form is publicly accessible to everyone!</p>
    </div>
  </div>

  <script>
    function setCurrentDate() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').value = today;
    }

    function setCityFromLatLng(lat, lng) {
      const cityInput = document.getElementById('city');
      // Example using OpenStreetMap Nominatim (no key, but rate-limited)
      fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
        .then(res => res.json())
        .then(data => {
          const addr = data.address || {};
          const city =
            addr.city ||
            addr.town ||
            addr.village ||
            addr.suburb ||
            addr.county ||
            'Unknown';
          cityInput.value = city;
        })
        .catch(err => {
          console.error('Reverse geocode error:', err);
          cityInput.value = 'Unknown';
        });
    }

    function getCurrentLocation() {
      const latInput = document.getElementById('latitude');
      const lngInput = document.getElementById('longitude');
      const cityInput = document.getElementById('city');

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          position => {
            const lat = position.coords.latitude.toFixed(4);
            const lng = position.coords.longitude.toFixed(4);
            latInput.value = lat;
            lngInput.value = lng;
            cityInput.value = 'Detecting city...';
            setCityFromLatLng(lat, lng);
          },
          error => {
            console.log('Geolocation error:', error);
            cityInput.value = 'Location not available';
          }
        );
      } else {
        cityInput.value = 'Geolocation not supported';
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      setCurrentDate();
      getCurrentLocation();

      const form = document.getElementById('trackingForm');
      const messageDiv = document.getElementById('message');

      form.addEventListener('submit', function (e) {
        e.preventDefault(); // stop page navigation

        const formData = new FormData(form); // city is NOT included (no name)

        fetch(form.action, {
          method: 'POST',
          body: formData
        })
          .then(res => res.json())
          .then(data => {
            if (data.result === 'success') {
              messageDiv.className = 'success';
              messageDiv.textContent = 'Location submitted successfully!';
              messageDiv.style.display = 'block';

              // wait 5 seconds, then reset form and hide message
              setTimeout(() => {
                form.reset();
                setCurrentDate();
                getCurrentLocation();
                messageDiv.className = '';
                messageDiv.textContent = '';
                messageDiv.style.display = 'none';
              }, 5000); // 5000 ms = 5 seconds
            } else {
              messageDiv.className = 'error';
              messageDiv.textContent =
                'Server error: ' + (data.message || 'Unknown error');
              messageDiv.style.display = 'block';
            }
          })
          .catch(err => {
            console.error(err);
            messageDiv.className = 'error';
            messageDiv.textContent =
              'Network error submitting location. Please try again.';
            messageDiv.style.display = 'block';
          });
      });
    });
  </script>
</body>
</html>
